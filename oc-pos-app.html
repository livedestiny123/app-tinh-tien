 {cat:"Sò lụa",items:["Xào xả ớt","Hấp xả","Hấp thái","Xào me"].map(n=>({name:n,price:35}))},
 {cat:"Ốc bưu",items:[{name:"Hấp xả",price:35},{name:"Ốc nhồi nướng",price:35}]},
 {cat:"Tu hài (theo mùa)",items:[{name:"Nướng mỡ hành",price:50},{name:"Hấp xả",price:50}]},
 {cat:"Nghêu",items:["Hấp xả","Hấp thái","Xào xả ớt"].map(n=>({name:n,price:35}))},
 {cat:"Gà nướng",items:[{name:"Chân gà nướng",price:35},{name:"Cánh gà nướng",price:45}]},
 {cat:"Sò mai",items:[{name:"Nướng mỡ hành",price:50},{name:"Nướng Phô Mai",price:50}]},
 {cat:"Nước ngọt & khác",items:[{name:"Pepsi",price:10},{name:"7up",price:10},{name:"Suối",price:5},{name:"Bò húc",price:12},{name:"Khăn lạnh",price:1}]},
];
const DEF_SHOP={name:"ỐC HẺM HUẾ",addr:"9 Kiệt 10 Nguyễn Du, Gia Hội, TP Huế",phone:"0906.584.518 - 0906.525.234"};
const TABLES=Array.from({length:30},(_,i)=>i+1);
const buildDefault=()=>RAW.map((c,ci)=>({catId:"c"+ci,cat:c.cat,items:c.items.map((it,ii)=>({id:"c"+ci+"i"+ii,...it}))}));
const nid=()=>"n"+Date.now().toString(36)+Math.floor(Math.random()*1000);
const fmt=k=>(k*1000).toLocaleString("vi-VN")+"đ";
const todayStr=()=>new Date().toLocaleDateString("vi-VN");
const freshSales=()=>({date:todayStr(),revenue:0,bills:0,items:{}});

const mem={};
const store={
 get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):(mem[k]??null);}catch(e){return mem[k]??null;}},
 set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;}}
};

/* ====== MÁY IN NHIỆT BLUETOOTH (ESC/POS, in dạng ảnh để đúng tiếng Việt) ====== */
const BT={device:null,char:null,name:""};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const PRINT_SERVICES=[0x18F0,0xFFE0,0xFF00,0xFF80,0xAE30,0xFEE0,0xFFB0,"49535343-fe7d-4ae5-8fa9-9fafd205e455","e7810a71-73ae-499d-8c15-faa9aef0c3f2"];

function buildOps(data,shop){
 const o=[];
 o.push({t:'c',s:shop.name,b:1,sz:'h'});
 o.push({t:'c',s:shop.addr,sz:'s'});
 o.push({t:'c',s:'ĐT: '+shop.phone,sz:'s'});
 o.push({t:'d'});
 if(data.kind==='bill'){
  o.push({t:'l',s:'Bàn: '+data.table});
  o.push({t:'l',s:new Date().toLocaleString('vi-VN'),sz:'s'});
  o.push({t:'d'});
  data.items.forEach(it=>{o.push({t:'l',s:it.name});o.push({t:'lr',l:'  '+it.qty+' x '+fmt(it.price),r:fmt(it.price*it.qty)});});
  o.push({t:'d'});
  o.push({t:'lr',l:'TỔNG CỘNG',r:fmt(data.total),b:1,sz:'h'});
  if(data.paid>0){o.push({t:'lr',l:'Khách đưa',r:data.paid.toLocaleString('vi-VN')+'đ'});o.push({t:'lr',l:'Thối lại',r:(data.change>=0?data.change:0).toLocaleString('vi-VN')+'đ'});}
  o.push({t:'d'});
  o.push({t:'c',s:'Cảm ơn quý khách!',sz:'s'});o.push({t:'c',s:'Hẹn gặp lại',sz:'s'});
 }else{
  o.push({t:'c',s:'TỔNG KẾT CUỐI NGÀY',b:1});
  o.push({t:'c',s:'Ngày '+data.date,sz:'s'});
  o.push({t:'d'});
  o.push({t:'lr',l:'TỔNG DOANH THU',r:fmt(data.revenue),b:1,sz:'h'});
  o.push({t:'lr',l:'Số bill',r:String(data.bills)});
  o.push({t:'lr',l:'TB / bill',r:fmt(data.avg)});
  o.push({t:'d'});
  o.push({t:'l',s:'MÓN ĐÃ BÁN',b:1});
  (data.items||[]).forEach(it=>o.push({t:'lr',l:it.name+' x'+it.qty,r:fmt(it.rev)}));
  o.push({t:'d'});o.push({t:'c',s:'--- Hết ---',sz:'s'});
 }
 return o;
}
function renderReceiptCanvas(ops,width){
 const FN=width>=560?27:21,FH=width>=560?34:26,FS=width>=560?22:17;
 const lh=v=>Math.round(v*1.45),pad=8;
 let H=14;ops.forEach(o=>{if(o.t==='d')H+=lh(FS);else if(o.t==='sp')H+=lh(FS)/2;else H+=lh(o.sz==='h'?FH:o.sz==='s'?FS:FN);});H+=18;
 const c=document.createElement('canvas');c.width=width;c.height=H;
 const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,width,H);x.fillStyle='#000';
 let y=12;
 const setF=o=>{const sz=o.sz==='h'?FH:o.sz==='s'?FS:FN;x.font=(o.b?'bold ':'')+sz+'px "Courier New",monospace';return sz;};
 ops.forEach(o=>{
  if(o.t==='d'){const sz=FS;y+=lh(sz)/2;x.save();x.strokeStyle='#000';x.lineWidth=1;x.setLineDash([4,4]);x.beginPath();x.moveTo(pad,y);x.lineTo(width-pad,y);x.stroke();x.restore();y+=lh(sz)/2;return;}
  if(o.t==='sp'){y+=lh(FS)/2;return;}
  const sz=setF(o),ly=y+sz;
  if(o.t==='c'){x.textAlign='center';x.fillText(o.s,width/2,ly);}
  else if(o.t==='l'){x.textAlign='left';x.fillText(o.s,pad,ly);}
  else{x.textAlign='right';x.fillText(o.r,width-pad,ly);x.textAlign='left';const rw=x.measureText(o.r).width;const maxw=width-pad*2-rw-10;let s=o.l;while(x.measureText(s).width>maxw&&s.length>1)s=s.slice(0,-1);x.fillText(s,pad,ly);}
  y+=lh(sz);
 });
 return c;
}
function canvasToEscPos(canvas,threshold){
 threshold=threshold||175;
 const w=canvas.width,h=canvas.height,ctx=canvas.getContext('2d'),img=ctx.getImageData(0,0,w,h).data;
 const bpr=Math.ceil(w/8),raster=new Uint8Array(bpr*h);
 for(let y=0;y<h;y++)for(let xx=0;xx<w;xx++){const i=(y*w+xx)*4;const lum=0.299*img[i]+0.587*img[i+1]+0.114*img[i+2];if(img[i+3]>128&&lum<threshold)raster[y*bpr+(xx>>3)]|=(0x80>>(xx&7));}
 const header=[0x1D,0x76,0x30,0x00,bpr&0xff,(bpr>>8)&0xff,h&0xff,(h>>8)&0xff];
 const init=[0x1B,0x40,0x1B,0x61,0x00];
 const tail=[0x0A,0x0A,0x0A,0x1D,0x56,0x42,0x00];
 const out=new Uint8Array(init.length+header.length+raster.length+tail.length);
 out.set(init,0);out.set(header,init.length);out.set(raster,init.length+header.length);out.set(tail,init.length+header.length+raster.length);
 return out;
}
async function btSend(bytes){
 const ch=BT.char;if(!ch)throw new Error("Chưa kết nối máy in");
 const CH=180;
 for(let i=0;i<bytes.length;i+=CH){
  const slice=bytes.slice(i,i+CH);
  if(ch.writeValueWithoutResponse&&ch.properties.writeWithoutResponse)await ch.writeValueWithoutResponse(slice);
  else await ch.writeValue(slice);
  await sleep(14);
 }
}
async function btPrint(data,shop,width){const ops=buildOps(data,shop);const c=renderReceiptCanvas(ops,width);await btSend(canvasToEscPos(c));}

function App(){
 const [boot]=useState(()=>{
  const ss=store.get("oc_sales");let hist=store.get("oc_history")||[];let sales;
  if(ss&&ss.date===todayStr())sales={items:{},...ss};
  else{if(ss&&(ss.revenue>0||ss.bills>0))hist=[{date:ss.date,revenue:ss.revenue,bills:ss.bills,items:ss.items||{}},...hist.filter(d=>d.date!==ss.date)].slice(0,31);sales=freshSales();}
  return{sales,hist};
 });
 const [menu,setMenu]=useState(()=>store.get("oc_menu")||buildDefault());
 const [orders,setOrders]=useState(()=>store.get("oc_orders")||{});
 const [sales,setSales]=useState(boot.sales);
 const [history,setHistory]=useState(boot.hist);
 const [shop,setShop]=useState(()=>store.get("oc_shop")||DEF_SHOP);
 const [settings,setSettings]=useState(()=>store.get("oc_settings")||{paper:58});
 const [view,setView]=useState("tables");
 const [table,setTable]=useState(null);
 const [q,setQ]=useState("");
 const [paid,setPaid]=useState("");
 const [showOrder,setShowOrder]=useState(false);
 const [moveOpen,setMoveOpen]=useState(false);
 const [payOpen,setPayOpen]=useState(false);
 const [reportOpen,setReportOpen]=useState(false);
 const [printData,setPrintData]=useState(null);
 const [openDay,setOpenDay]=useState(null);
 const [btStatus,setBtStatus]=useState(BT.char?"connected":"off");
 const [btName,setBtName]=useState(BT.name||"");

 useEffect(()=>store.set("oc_menu",menu),[menu]);
 useEffect(()=>store.set("oc_orders",orders),[orders]);
 useEffect(()=>store.set("oc_sales",sales),[sales]);
 useEffect(()=>store.set("oc_history",history),[history]);
 useEffect(()=>store.set("oc_shop",shop),[shop]);
 useEffect(()=>store.set("oc_settings",settings),[settings]);

 const paperW=settings.paper===80?576:384;
 const itemMap=useMemo(()=>{const m={};menu.forEach(c=>c.items.forEach(it=>m[it.id]={...it,cat:c.cat}));return m;},[menu]);
 const tableTotal=t=>Object.entries(orders[t]||{}).reduce((s,[id,qty])=>s+(itemMap[id]?itemMap[id].price*qty:0),0);
 const tableCount=t=>Object.values(orders[t]||{}).reduce((s,qty)=>s+qty,0);

 const setT=u=>setOrders(o=>({...o,[table]:u(o[table]||{})}));
 const add=id=>setT(t=>({...t,[id]:(t[id]||0)+1}));
 const dec=id=>setT(t=>{const n={...t};n[id]=(n[id]||0)-1;if(n[id]<=0)delete n[id];return n;});
 const remove=id=>setT(t=>{const n={...t};delete n[id];return n;});
 const clearTable=()=>{if(confirm("Xóa toàn bộ món của bàn "+table+"?")){setOrders(o=>{const n={...o};delete n[table];return n;});setPaid("");}};

 const orderList=Object.entries(orders[table]||{}).map(([id,qty])=>itemMap[id]?{...itemMap[id],qty}:null).filter(Boolean);
 const total=orderList.reduce((s,it)=>s+it.price*it.qty,0);
 const count=orderList.reduce((s,it)=>s+it.qty,0);
 const paidNum=parseInt(paid.replace(/\D/g,"")||"0",10);
 const change=paidNum-total*1000;

 const today=todayStr();
 const sToday=sales.date===today?sales:freshSales();
 const soldItems=Object.values(sToday.items||{}).sort((a,b)=>b.qty-a.qty);
 const openValue=TABLES.reduce((s,t)=>s+tableTotal(t),0);
 const openTables=TABLES.filter(t=>tableTotal(t)>0).length;
 const avg=sToday.bills?Math.round(sToday.revenue/sToday.bills):0;

 const browserPrint=data=>{setPrintData(data);requestAnimationFrame(()=>requestAnimationFrame(()=>{try{window.print();}catch(e){}}));};
 const doPrint=data=>{if(BT.char){btPrint(data,shop,paperW).catch(e=>{alert("Lỗi in Bluetooth, chuyển sang in qua hộp thoại.\n"+(e.message||e));browserPrint(data);});}else browserPrint(data);};
 const printBill=()=>orderList.length&&doPrint({kind:"bill",table,items:orderList.map(it=>({name:it.name,price:it.price,qty:it.qty})),total,paid:paidNum,change});
 const printReport=()=>doPrint({kind:"report",date:today,revenue:sToday.revenue,bills:sToday.bills,avg,items:soldItems,openValue,openTables});
 const printDay=d=>{const its=Object.values(d.items||{}).sort((a,b)=>b.qty-a.qty);doPrint({kind:"report",date:d.date,revenue:d.revenue,bills:d.bills,avg:d.bills?Math.round(d.revenue/d.bills):0,items:its});};

 const doCheckout=withPrint=>{
  if(!orderList.length)return;
  const t=table,amt=total,snap=orderList.map(it=>({id:it.id,name:it.name,price:it.price,qty:it.qty})),pNum=paidNum,ch=change;
  setSales(s=>{const b=s.date===today?s:freshSales();const items={...(b.items||{})};snap.forEach(it=>{const e=items[it.id]||{name:it.name,qty:0,rev:0};items[it.id]={name:it.name,qty:e.qty+it.qty,rev:e.rev+it.price*it.qty};});return{date:today,revenue:b.revenue+amt,bills:b.bills+1,items};});

 const btConnect=async()=>{
  if(!navigator.bluetooth){alert("Thiết bị/trình duyệt này không hỗ trợ Bluetooth (iPhone không hỗ trợ in Bluetooth qua web). Hãy dùng 'In qua hộp thoại'.");return;}
  try{
   setBtStatus("connecting");
   const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:PRINT_SERVICES});
   const srv=await dev.gatt.connect();
   const services=await srv.getPrimaryServices();
   let ch=null;
   for(const s of services){let cs;try{cs=await s.getCharacteristics();}catch(e){continue;}for(const c of cs){if(c.properties.write||c.properties.writeWithoutResponse){ch=c;break;}}if(ch)break;}
   if(!ch)throw new Error("Không tìm thấy kênh in trên thiết bị này. Máy in có thể chưa được hỗ trợ.");
   BT.device=dev;BT.char=ch;BT.name=dev.name||"Máy in nhiệt";
   dev.addEventListener('gattserverdisconnected',()=>{BT.char=null;setBtStatus("off");});
   setBtName(BT.name);setBtStatus("connected");
  }catch(e){setBtStatus(BT.char?"connected":"off");if(e.name!=='NotFoundError')alert("Không kết nối được: "+(e.message||e));}
 };
 const btDisconnect=()=>{try{BT.device&&BT.device.gatt&&BT.device.gatt.disconnect();}catch(e){}BT.char=null;setBtStatus("off");};

     {printData.openValue>0&&<div style={rsb}><span>Bàn chưa thu ({printData.openTables})</span><span>{fmt(printData.openValue)}</span></div>}
     <div style={dash}/>
     <div style={{fontWeight:700,marginBottom:4}}>MÓN ĐÃ BÁN</div>
     {(printData.items||[]).map((it,i)=>(<div key={i} style={rsb}><span>{it.name} x{it.qty}</span><span>{fmt(it.rev)}</span></div>))}
     <div style={dash}/>
     <div style={{textAlign:"center",fontSize:11}}>--- Hết ---</div>
    </React.Fragment>
   )}
  </div>
 </div>
 );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
